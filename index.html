<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英単語マスター - 英検準一級対策</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- 単語データ (wordData変数) を読み込む -->
    <script src="data.js"></script>
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="container">
        <header>
            <h1>英検準一級英単語</h1>
            <div class="header-controls">
                <div class="select-wrapper">
                    <select id="part-select" class="part-select">
                        <!-- オプションはJSで動的に生成されます -->
                    </select>
                </div>
                <button id="btn-refresh" class="btn-refresh" title="画面を再読み込み">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" style="width: 18px; height: 18px;">
                        <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                    </svg>
                </button>
            </div>
        </header>

        <main id="app-main">
            <div class="progress-container">
                <div class="progress-stats">
                    <span id="mastered-count">0</span> / <span id="total-count">0</span> Mastered
                </div>
                <div class="progress-bar-bg">
                    <div id="progress-bar" class="progress-bar-fill"></div>
                </div>
            </div>

            <!-- Loading State -->
            <div id="loading-state" class="state-view active">
                <div class="spinner"></div>
                <p>データを読み込んでいます...</p>
            </div>


            <!-- Error State -->
            <div id="error-state" class="state-view hidden">
                <div class="icon-error">⚠️</div>
                <p id="error-message">データの読み込みに失敗しました。</p>
                <button id="retry-btn" class="btn btn-secondary">再試行</button>
            </div>

            <!-- Quiz State -->
            <div id="quiz-state" class="state-view hidden">
                <div class="flashcard" id="flashcard">
                    <div class="card-front">
                        <div class="word-container">
                            <h2 id="english-word" class="word-display">Word</h2>
                            <button id="btn-speak" class="btn-speak" title="発音を聞く">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M13.5 4.06c0-.75-.74-1.23-1.42-.91L6.75 5.86H4.5C3.12 5.86 2 6.98 2 8.36v7.28c0 1.38 1.12 2.5 2.5 2.5h2.25l5.33 2.71c.68.32 1.42-.16 1.42-.91V4.06zM17.5 12c0-1.78-1.02-3.32-2.5-4.07v8.14c1.48-.75 2.5-2.29 2.5-4.07zm3.5 0c0-3.32-2.31-6.1-5.43-6.84v1.85c2.11.7 3.65 2.7 3.65 4.99s-1.54 4.29-3.65 4.99v1.85c3.12-.74 5.43-3.52 5.43-6.84z"/>
                                </svg>
                            </button>
                        </div>
                        <div class="action-buttons" style="margin-top: 2rem;">
                            <button id="btn-incorrect" class="btn btn-danger">
                                <span class="icon">✖️</span> わからない
                            </button>
                            <button id="btn-correct" class="btn btn-success">
                                <span class="icon">✔️</span> わかった
                            </button>
                        </div>
                    </div>
                    <div class="card-back">
                        <h2 id="japanese-meaning" class="meaning-display">意味</h2>
                        <div class="action-buttons">
                            <button id="btn-next" class="btn btn-primary" style="width: 100%;">
                                次の単語へ ➔
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Completed State -->
            <div id="completed-state" class="state-view hidden">
                <div class="celebration">🎉</div>
                <h2>素晴らしい！</h2>
                <p id="completed-message">このパートのすべての単語をマスターしました！</p>
                <div class="completed-buttons mt-4" style="display: flex; flex-direction: column; gap: 0.75rem; width: 100%;">
                    <button id="btn-next-part" class="btn btn-primary" style="width: 100%;">
                        次のパートへ進む ➔
                    </button>
                    <button id="btn-reset-part" class="btn btn-success" style="width: 100%;">
                        このパートを最初からやり直す
                    </button>
                    <button id="btn-reset-all" class="btn btn-text" style="margin-top: 0.5rem;">
                        全体の学習記録をリセット
                    </button>
                </div>
            </div>
        </main>

        <footer>
            <button id="btn-reset-progress" class="btn btn-text">学習記録をリセット</button>
        </footer>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
